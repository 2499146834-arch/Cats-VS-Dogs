* { box-sizing: border-box; margin: 0; padding: 0; }
body {

.card {

}

.status { font-size: 13px; margin-bottom: 20px; min-height: 20px; }

.status.error { color: #e74c3c; }
.dropzone {

}
.dropzone.blocked { opacity: 0.4; pointer-events: none; }
.dropzone:hover, .dropzone.drag { border-color: #667eea; background: #eef0ff; }
.dropzone p { color: #999; font-size: 15px; line-height: 1.6; }
.btn { display: inline-block; margin-top: 12px; padding: 10px 28px;
  background: #667eea; color: #fff; border: none; border-radius: 8px;
  font-size: 15px; cursor: pointer; transition: background .2s; }
.btn:hover { background: #5a6fd6; }
input[type=file] { display: none; }
.preview { margin-top: 24px; display: none; }
.preview img { max-width: 280px; max-height: 280px; border-radius: 10px; box-shadow: 0 4px 16px rgba(0,0,0,.15); }
.result { margin-top: 20px; display: none; }
.result .label { font-size: 36px; font-weight: 700; }
.label.cat { color: #e67e22; }
.label.dog { color: #2980b9; }
.label.thinking { color: #999; font-size: 20px !important; }
.bars { margin-top: 16px; text-align: left; max-width: 360px; margin-inline: auto; }
.bar-row { display: flex; align-items: center; margin: 8px 0; gap: 10px; }
.bar-row .cls { width: 40px; font-weight: 600; font-size: 14px; text-align: right; }
.cls.cat { color: #e67e22; } .cls.dog { color: #2980b9; }
.bar-track { flex: 1; height: 24px; background: #eee; border-radius: 12px; overflow: hidden; }
.bar-fill { height: 100%; border-radius: 12px; transition: width .4s ease; }
.bar-fill.cat { background: linear-gradient(90deg, #f39c12, #e67e22); }
.bar-fill.dog { background: linear-gradient(90deg, #3498db, #2980b9); }
.bar-row .pct { width: 56px; font-size: 13px; color: #666; }
.footer { margin-top: 28px; color: #bbb; font-size: 12px; }
.spinner { display: inline-block; width: 16px; height: 16px; border: 2px solid #ccc;
  border-top-color: #667eea; border-radius: 50%; animation: spin .6s linear infinite;
  vertical-align: middle; margin-right: 4px; }
@keyframes spin { to { transform: rotate(360deg); } }
</style>

// ---- Inference ----
async function predict(imageElement) {
  return tf.tidy(() => {
    // Preprocess: resize -> normalize to [-1, 1]
    const img = tf.browser.fromPixels(imageElement).toFloat();
    const resized = tf.image.resizeBilinear(img, [IMG_SIZE, IMG_SIZE]);
    const normalized = resized.div(127.5).sub(1).expandDims(0);  // [1, 160, 160, 3]

    // Get 1280-dim embedding from backbone
    const features = backbone.predict(normalized);  // [1, 1280]

    // Apply our classifier head: sigmoid(features @ kernel + bias)
    const logit = features.matMul(headKernel).add(headBias);  // [1, 1]
    return tf.sigmoid(logit).dataSync()[0];
  });
}

// ---- UI ----
dropzone.addEventListener("click", () => { if (ready) fileInput.click(); });
dropzone.addEventListener("dragover", e => { e.preventDefault(); if (ready) dropzone.classList.add("drag"); });
dropzone.addEventListener("dragleave", () => dropzone.classList.remove("drag"));
dropzone.addEventListener("drop", e => {
  e.preventDefault(); dropzone.classList.remove("drag");
  if (e.dataTransfer.files.length && ready) handleFile(e.dataTransfer.files[0]);
});
fileInput.addEventListener("change", () => {
  if (fileInput.files.length) handleFile(fileInput.files[0]);
});

function handleFile(f) {
  if (!f.type.startsWith("image/")) { alert("请上传图片文件"); return; }
  const reader = new FileReader();
  reader.onload = e => {
    const img = new Image();
    img.onload = async () => {
      previewImg.src = e.target.result;
      preview.style.display = "block";
      resultDiv.style.display = "block";
      labelText.textContent = "分析中...";
      labelText.className = "label thinking";

      try {
        const p = await predict(img);
        const catP = (1 - p) * 100;
        const dogP = p * 100;
        const label = p >= 0.5 ? "dog" : "cat";
        const emoji = label === "cat" ? "\u{1F431}" : "\u{1F436}";

        labelText.textContent = emoji + " 这是" + (label === "cat" ? "猫" : "狗") + "！";
        labelText.className = "label " + label;
        catBar.style.width = catP.toFixed(1) + "%";
        dogBar.style.width = dogP.toFixed(1) + "%";
        catPct.textContent = catP.toFixed(1) + "%";
        dogPct.textContent = dogP.toFixed(1) + "%";
      } catch (err) {
        labelText.textContent = "预测出错";
        console.error(err);
      }
    };
    img.src = e.target.result;
  };
  reader.readAsDataURL(f);
}

init();
